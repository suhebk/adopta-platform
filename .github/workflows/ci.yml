name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Adopta.slnx

      - name: Build
        run: dotnet build Adopta.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Adopta.slnx --configuration Release --no-build

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install TypeScript workspace
        run: pnpm install --frozen-lockfile=false

      - name: Type-check TypeScript workspace
        run: pnpm typecheck

      - name: Build TypeScript workspace
        run: pnpm build

      - name: Test TypeScript workspace
        run: pnpm test
